name: Sync to Hugging Face
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Davemb:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Davemb/shift-scheduler main
